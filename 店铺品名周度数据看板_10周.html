*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#111820;--s2:#161d27;--s3:#1d2630;
  --bd:#243040;--bd2:#1e2a36;

body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:13px}
#hdr{background:linear-gradient(160deg,#0a1520,#0e1a28 55%,#0d1117);border-bottom:2px solid var(--bd);

#hdr::before{content:'';position:absolute;top:-60px;right:-80px;width:360px;height:360px;border-radius:50%;

.ht{font-family:var(--mono);font-size:19px;color:#e8f4ff;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bl);box-shadow:0 0 10px var(--bl);animation:bk 2.5s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.35}}
.hs{font-size:11px;color:var(--mu);margin-top:5px}
.hr{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.bdg{font-family:var(--mono);font-size:10px;border:1px solid var(--bd);border-radius:3px;padding:3px 10px;color:var(--mu);background:rgba(255,255,255,.02)}
.bdg.hi{border-color:rgba(79,163,224,.35);color:var(--bl2)}
#ab{border-bottom:1px solid rgba(240,112,96,.22);padding:8px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:linear-gradient(90deg,rgba(240,112,96,.09),rgba(232,148,58,.05))}
.ab-t{font-family:var(--mono);font-size:11px;color:var(--rd);font-weight:500;white-space:nowrap}
.ab-t::before{content:'⚠ '}
.ab-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;font-family:var(--mono);background:rgba(240,112,96,.09);border:1px solid rgba(240,112,96,.2);
  border-radius:3px;padding:3px 8px;color:var(--rd2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{background:rgba(240,112,96,.2)}
.chip.ok{background:rgba(63,185,80,.08);border-color:rgba(63,185,80,.2);color:var(--gr2)}
.chip.acos{background:rgba(232,148,58,.1);border-color:rgba(232,148,58,.25);color:var(--or2)}
.chip.profit{background:rgba(157,128,232,.1);border-color:rgba(157,128,232,.25);color:#c0a8ff}
#sum{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd2);border-bottom:2px solid var(--bd)}
.sc{background:var(--s1);padding:14px 16px;position:relative;overflow:hidden;transition:background .15s}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ca,transparent);opacity:.6}
.sc:hover{background:var(--s2)}
.sc-l{font-size:10px;color:var(--mu);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
.sc-v{font-family:var(--mono);font-size:17px;font-weight:500;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-f{font-size:10px;color:var(--mu);margin-top:4px}
#ctrl{background:var(--s2);border-bottom:1px solid var(--bd2);padding:11px 28px;
  display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px)}
.cl{display:flex;flex-direction:column;gap:4px}
.cl-l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--di)}
select{background:var(--s3);color:var(--tx);border:1px solid var(--bd);border-radius:4px;
  padding:6px 28px 6px 10px;font-size:12px;font-family:var(--sans);cursor:pointer;appearance:none;outline:none;

  background-repeat:no-repeat;background-position:right 9px center;min-width:118px;transition:border-color .15s}
select:focus{border-color:var(--bl)}
.mts{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.mt{font-family:var(--sans);font-size:11px;background:var(--s3);border:1px solid var(--bd);border-radius:4px;
  padding:5px 10px;cursor:pointer;color:var(--mu);transition:all .15s;white-space:nowrap}
.mt:hover{color:var(--tx);border-color:var(--di)}
.mt.act.tb{background:#122238;border-color:var(--bl);color:var(--bl2)}
.mt.act.tp{background:#0f2a18;border-color:var(--gr);color:var(--gr2)}
.mt.act.ta{background:#2a1e08;border-color:var(--or);color:var(--or2)}
.mt.act.tr{background:#2a1010;border-color:var(--rd);color:var(--rd2)}
.mt.act.tf{background:#0e2030;border-color:var(--cy);color:var(--cy)}
.dts{display:flex;border:1px solid var(--bd);border-radius:4px;overflow:hidden}
.dt{font-size:12px;padding:5px 13px;cursor:pointer;background:var(--s3);color:var(--mu);border:none;transition:all .15s}
.dt:first-child{border-right:1px solid var(--bd)}
.dt.act{background:#122238;color:var(--bl);font-weight:600}
#main{padding:20px 28px 48px}
.sh{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bd2)}
.st{font-family:var(--mono);font-size:12px;color:var(--bl2);letter-spacing:1.2px}
.sb{font-size:10px;font-family:var(--mono);color:var(--mu);background:var(--s3);border:1px solid var(--bd);border-radius:3px;padding:2px 8px}

<script>
const BAR_LABEL_PLUGIN={
  id:'barLabels',
  afterDatasetsDraw(chart){
    const {ctx,data,chartArea:{top},scales:{x,y,yA}}=chart;
    const yScale=y||yA; if(!yScale)return;
    ctx.save();
    ctx.font='600 8px "DM Mono",monospace';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    data.datasets.forEach((ds,di)=>{
      if(ds.type==='line'||ds._noLabel)return;
      const meta=chart.getDatasetMeta(di); if(meta.hidden)return;
      meta.data.forEach((bar,i)=>{
        const v=ds.data[i]; if(v==null||Math.abs(v)<0.01)return;
        const lbl=ds._fmt?ds._fmt(v):String(Math.round(v)); if(!lbl)return;
        const k=ds._k;
        const isP=ds._isProfit||(k&&['结算毛利润','订单毛利润'].includes(k));
        const isR=ds._isRate;
        if(isP||isR) ctx.fillStyle=v>=0?'#3fb950':'#f07060';
        else if(k&&['退货量','退货率'].includes(k)) ctx.fillStyle=v>0?'#f07060':'#4a5a60';
        else ctx.fillStyle='#8090a0';
        const by=Math.min(bar.y,bar.base)-3;
        if(by<top+2)return;
        ctx.fillText(lbl,bar.x,by);
      });
    });
    ctx.restore();
  }
};
Chart.register(BAR_LABEL_PLUGIN);

  const ts=tot===null?'—':fv(tot,MT);const tc=TY==='profit'?(tot>=0?'#3fb950':'#f07060'):'var(--bl)';
  el.querySelector('.cn').textContent=store;el.querySelector('.cn').style.color=SC[store]||'#e8f4ff';
  el.querySelector('.cm').innerHTML=`<strong style="color:${tc}">${ts}</strong><span style="color:var(--di)">·</span>${prods.length}品名<span class="tag">${store.endsWith('-CA')?'CAD→¥':'USD→¥'}</span>`;
  draw(id,ds,yFmt);
}

function prodChart(el,prod,sl){
  const id='c_'+prod.replace(/\W/g,'_')+'_p';
  el.querySelector('canvas').id=id;
  const at=sl.some(s=>getAn(s,prod))?anType(sl.find(s=>getAn(s,prod)),prod):null;
  let ds=[],yFmt=v=>v;
  if(TY==='combo'){
    const ga=k=>WKS.map(w=>sl.reduce((a,s)=>a+wv(s,prod,w,k),0));
    const ad=ga('广告花费'),ar=ga('广告销售额'),sa=ga('销售额');
    ds=adComboDS(ad,WKS.map((_,i)=>ar[i]>0?ad[i]/ar[i]*100:0),
      WKS.map((_,i)=>sa[i]>0?ad[i]/sa[i]*100:0),WKS.map((_,i)=>sa[i]>0?ar[i]/sa[i]*100:0));
    const tot=ad.reduce((a,v)=>a+v,0);
    el.querySelector('.cn').textContent=prod;
    if(at)el.querySelector('.cn').style.color=at==='ok'?'var(--gr2)':at==='acos'?'var(--or2)':at==='profit'?'#c0a8ff':'var(--rd2)';
    el.querySelector('.cm').innerHTML=`<strong style="color:var(--or)">¥${Math.round(tot).toLocaleString('zh')}</strong>·${sl.length}店铺`;
    draw(id,ds,null,{combo:true});return;
  }else if(TY==='multi'){
    const md=MDEF[MT];
    sl.forEach(s=>md.keys.forEach((k,ki)=>ds.push({label:`${s}·${md.lbs[ki]}`,
      data:WKS.map(w=>wv(s,prod,w,k)),
      backgroundColor:WKS.map((_,wi)=>wi===9?md.cols[ki]:md.cols[ki]+'55'),borderRadius:3,_k:k,_fmt:mkFmt(k)})));
    yFmt=v=>Math.round(v);
  }else{
    const isP=TY==='profit',isR=TY==='rate';
    sl.forEach(s=>{const base=SC[s]||'#4fa3e0';
      ds.push({label:s,data:WKS.map(w=>wv(s,prod,w,MT)),
        backgroundColor:WKS.map((_,wi)=>wi===9?base:base+'66'),
        borderRadius:4,_k:MT,_isProfit:isP,_isRate:isR,_fmt:mkFmt(MT)});});
    if(TY==='rate')yFmt=v=>v.toFixed(0)+'%';
    else if(TY==='money')yFmt=v=>'¥'+Math.abs(v/1000).toFixed(0)+'k';
    else if(TY==='profit')yFmt=v=>(v>=0?'+':'-')+'¥'+Math.abs(v/1000).toFixed(0)+'k';
    else yFmt=v=>Math.round(v);
  }
  const tot=TY==='multi'?null:sl.reduce((a,s)=>a+WKS.reduce((b,w)=>b+wv(s,prod,w,MT),0),0);
  const ts=tot===null?'—':fv(tot,MT);const tc=TY==='profit'?(tot>=0?'#3fb950':'#f07060'):'var(--bl)';
  el.querySelector('.cn').textContent=prod;
  if(at)el.querySelector('.cn').style.color=at==='ok'?'var(--gr2)':at==='acos'?'var(--or2)':at==='profit'?'#c0a8ff':'var(--rd2)';
  el.querySelector('.cm').innerHTML=`<strong style="color:${tc}">${ts}</strong><span style="color:var(--di)">·</span>${sl.length}店铺`;
  draw(id,ds,yFmt);
}

function renderSum(ss){
  let qty=0,sa=0,ad=0,ar=0,pr=0;
  ss.forEach(s=>Object.values(RAW[s]||{}).forEach(ws=>ws.forEach(w=>{qty+=w['销量'];sa+=w['销售额'];ad+=w['广告花费'];ar+=w['广告销售额'];pr+=w['结算毛利润'];})));
  const roas=ad>0?(ar/ad).toFixed(2):'—';const acos=ar>0?(ad/ar*100).toFixed(1)+'%':'—';
  const pC=pr>=0?'var(--gr)':'var(--rd)';const f=v=>v.toLocaleString('zh',{maximumFractionDigits:0});
  document.getElementById('sum').innerHTML=[
    {l:'总销量',v:f(qty),c:'var(--bl2)',ca:'#4fa3e0',f:'10周合计'},
    {l:'总销售额',v:'¥'+f(sa),c:'var(--gr)',ca:'#38a060',f:'10周合计'},
    {l:'广告花费',v:'¥'+f(ad),c:'var(--rd)',ca:'#c05040',f:'10周合计'},
    {l:'广告销售额',v:'¥'+f(ar),c:'var(--pu)',ca:'#8060c0',f:'10周合计'},
    {l:'综合ROAS',v:roas+'x',c:'var(--or)',ca:'#c06820',f:'广告销售额/广告花费'},
    {l:'综合ACOS',v:acos,c:'var(--or2)',ca:'#c07820',f:'广告花费/广告销售额'},
    {l:'结算毛利润',v:(pr>=0?'+¥':'-¥')+f(Math.abs(pr)),c:pC,ca:pr>=0?'#28804a':'#a04030',f:'10周合计'},
  ].map(x=>`<div class="sc" style="--ca:${x.ca}"><div class="sc-l">${x.l}</div><div class="sc-v" style="color:${x.c}">${x.v}</div><div class="sc-f">${x.f}</div></div>`).join('');
  document.getElementById('bsale').textContent='销售额 ¥'+f(sa);
  document.getElementById('bprofit').textContent='毛利润 '+(pr>=0?'+¥':'-¥')+f(Math.abs(pr));
  document.getElementById('broas').textContent='ROAS '+roas+'x';
}

function renderBanner(){
  const b=document.getElementById('ab');if(!AN.length){b.style.display='none';return;}
  const drops=AN.filter(a=>!a.issues.join('').match(/恢复|ACOS|毛利润异常/));
  const acos=AN.filter(a=>a.issues.join('').includes('ACOS'));
  const profit=AN.filter(a=>a.issues.join('').includes('毛利润异常'));
  const oks=AN.filter(a=>a.issues.join('').includes('恢复'));
  b.innerHTML=`<div class="ab-t">W10 异常检测 (${AN.length})</div>
    <div class="ab-chips">
      ${drops.map(a=>`<div class="chip"     onclick="jump('${a.store}','${a.product}')" title="${a.issues.join('\n')}">${a.store}·${a.product}</div>`).join('')}
      ${acos .map(a=>`<div class="chip acos" onclick="jump('${a.store}','${a.product}')" title="${a.issues.join('\n')}">${a.store}·${a.product}</div>`).join('')}
      ${profit.map(a=>`<div class="chip profit" onclick="jump('${a.store}','${a.product}')" title="${a.issues.join('\n')}">${a.store}·${a.product}</div>`).join('')}
      ${oks  .map(a=>`<div class="chip ok" onclick="jump('${a.store}','${a.product}')" title="${a.issues.join('\n')}">${a.store}·${a.product}</div>`).join('')}
    </div>`;
}

function jump(s,p){
  if(DIM==='store'){DIM='product';document.querySelectorAll('.dt').forEach(b=>b.classList.toggle('act',b.dataset.d==='product'));render();}
  const id='cc_'+s.replace(/\W/g,'_')+'_'+p.replace(/\W/g,'_');
  setTimeout(()=>{const el=document.getElementById(id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});
    el.style.boxShadow='0 0 0 2px rgba(240,112,96,.8)';setTimeout(()=>el.style.boxShadow='',2000);}},350);
}

function mkCard(cid){
  const d=document.createElement('div');d.className='cc';if(cid)d.id=cid;
  d.innerHTML='<div class="cn"></div><div class="cm"></div><div class="wrap"><canvas></canvas></div>';
  return d;
}

function render(){
  const ss=actSt();renderSum(ss);
  Object.keys(CI).forEach(id=>{try{CI[id].destroy()}catch(e){}delete CI[id]});
  document.getElementById('main').innerHTML='';
  const main=document.getElementById('main');
  const jobs=[];

  if(DIM==='store'){
    const h=document.createElement('div');h.className='sh';
    h.innerHTML=`<div class="st">// 按店铺 · 品名汇总趋势</div><div class="sb">${ss.length} STORES · 10 WEEKS · W10柱加深</div>`;
    main.appendChild(h);
    const g=document.createElement('div');g.className='grid';
    ss.forEach(s=>{const c=mkCard();g.appendChild(c);jobs.push(()=>storeChart(c,s));});
    main.appendChild(g);
  }else{
    let ps=aPs(ss);
    if(ZF==='hide')ps=ps.filter(p=>ss.some(s=>RAW[s]&&RAW[s][p]&&RAW[s][p].some(w=>w['销量']>0)));
    if(AF==='anom')ps=ps.filter(p=>ss.some(s=>getAn(s,p)));
    document.getElementById('bprods').textContent=ps.length+' 品名';
    const h=document.createElement('div');h.className='sh';
    h.innerHTML=`<div class="st">// 按品名 · 各店铺对比</div><div class="sb">${ps.length} PRODUCTS · W10柱加深</div>`;
    main.appendChild(h);
    const g=document.createElement('div');g.className='grid';
    ps.forEach(p=>{
      const vs=ss.filter(s=>RAW[s]&&RAW[s][p]);if(!vs.length)return;
      const anSt=vs.filter(s=>getAn(s,p));
      const at=anSt.length?anType(anSt[0],p):null;
      const cid='cc_'+vs[0].replace(/\W/g,'_')+'_'+p.replace(/\W/g,'_');
      const c=mkCard(cid);
      if(at){
        c.classList.add('a-'+at);
        const a=getAn(anSt[0],p);
        const badge=document.createElement('div');
        badge.className='an-b '+at;badge.title=a.issues.join('\n');
        badge.textContent=(at==='ok'?'↑ ':at==='acos'?'◈ ':at==='profit'?'↑¥ ':'↓ ')+a.issues[0].substring(0,24);
        c.appendChild(badge);
      }
      g.appendChild(c);jobs.push(()=>prodChart(c,p,vs));
    });
    main.appendChild(g);
  }
  requestAnimationFrame(()=>requestAnimationFrame(()=>jobs.forEach(fn=>fn())));
}

(function(){
  const sel=document.getElementById('ss');
  aSt().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o)});
  document.querySelectorAll('.mt').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.mt').forEach(x=>x.classList.remove('act'));
    b.classList.add('act');MT=b.dataset.m;TY=b.dataset.t;render();
  }));
  document.querySelectorAll('.dt').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.dt').forEach(x=>x.classList.remove('act'));
    b.classList.add('act');DIM=b.dataset.d;render();
  }));
  document.getElementById('ss').addEventListener('change',e=>{SF=e.target.value;render()});
  document.getElementById('sz').addEventListener('change',e=>{ZF=e.target.value;render()});
  document.getElementById('sa').addEventListener('change',e=>{AF=e.target.value;render()});
  renderBanner();render();
})();
</script>
</body>
</html>
