const YEARS=[2021,2022,2023,2024,2025];
let activeCat='all';

// flatten
const allRows=[];
for(const [cat,rows] of Object.entries(RAW)){
  rows.forEach(r=>allRows.push({...r,cat}));
}

function fmt(n){return n>0?n.toLocaleString():'-'}
function fmtK(n){return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':n>0?n:''}

function sparkline(vals,color){
  const max=Math.max(...vals,1);
  return '<div class="sparkline">'+vals.map(v=>{
    const h=Math.max(2,Math.round((v/max)*22));
    const op=v>0?1:0.15;
    return `<div class="spark-bar" style="height:${h}px;background:${color};opacity:${op}"></div>`;
  }).join('')+'</div>';
}

function buildSummary(){
  const div=document.getElementById('summary');
  const counts={all:allRows.length};
  allRows.forEach(r=>counts[r.cat]=(counts[r.cat]||0)+1);
  const items=[{id:'all',label:'全部关键词',color:'#888780',bg:'#F1EFE8',text:'#444441'},...Object.entries(CATS).map(([id,c])=>({id,...c}))];
  div.innerHTML=items.map(c=>`<div class="scard${activeCat===c.id?' on':''}" style="background:${c.bg};color:${c.text}" onclick="setTab('${c.id}')">
    <div class="scard-label">${c.label||'全部'}</div>
    <div class="scard-n">${counts[c.id]||0}</div>
  </div>`).join('');
}

function setTab(id){activeCat=id;buildSummary();render();}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  let rows=allRows.filter(r=>{
    if(activeCat!=='all'&&r.cat!==activeCat)return false;
    if(q&&!r.keyword.toLowerCase().includes(q)&&!r.zh.includes(q))return false;
    return true;
  });
  rows.sort((a,b)=>b.total-a.total);
  document.getElementById('meta').textContent=`共 ${rows.length} 条`;
  document.getElementById('tb').innerHTML=rows.map((r,i)=>{
    const c=CATS[r.cat];
    return `<tr>
      <td style="color:var(--color-text-secondary)">${i+1}</td>
      <td style="font-size:12px;max-width:180px">${r.keyword}</td>
      <td style="color:var(--color-text-secondary);font-size:11px;max-width:100px">${r.zh}</td>
      <td><span class="trend-badge" style="background:${c.bg};color:${c.text}">${c.label}</span></td>
      <td>${sparkline(r.vals,c.color)}</td>
      ${r.vals.map(v=>`<td class="num" style="color:${v>0?'var(--color-text-primary)':'var(--color-text-secondary)'}">${fmtK(v)}</td>`).join('')}
      <td class="num" style="font-weight:500">${fmtK(r.total)}</td>
    </tr>`;
  }).join('');
}

buildSummary();
render();
</script>
