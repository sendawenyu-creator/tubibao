<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店铺·品名 周度数据看板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Noto Sans SC','DM Mono',monospace;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:700;color:#e6edf3;letter-spacing:.5px}
header span{font-size:12px;color:#8b949e}
.ctrl-bar{background:#0d1117;padding:12px 24px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-lbl{font-size:11px;color:#8b949e;white-space:nowrap}
.tab-row{display:flex;gap:4px;flex-wrap:wrap}
.tab{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap}
.tab:hover{background:#30363d;color:#e6edf3}
.tab.active{background:#1f6feb;border-color:#388bfd;color:#e6edf3}
select{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:4px 8px;border-radius:4px;font-size:11px;font-family:inherit;cursor:pointer}
.summary{display:flex;gap:12px;padding:16px 24px;flex-wrap:wrap;border-bottom:1px solid #21262d}
.scard{background:#161b22;border:1px solid #30363d;border-top:2px solid var(--ca,#388bfd);border-radius:6px;padding:10px 14px;min-width:120px}
.scard-lbl{font-size:10px;color:#8b949e;margin-bottom:4px}
.scard-val{font-size:18px;font-weight:700;color:#e6edf3;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.scard-sub{font-size:10px;color:#8b949e;margin-top:2px}
#main{padding:16px 24px;display:grid;gap:16px}
#main.dim-store{grid-template-columns:repeat(auto-fill,minmax(520px,1fr))}
#main.dim-prod{grid-template-columns:repeat(auto-fill,minmax(600px,1fr))}
.ccard{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.ccard-hdr{background:#0d1117;border-bottom:1px solid #21262d;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.ccard-name{font-size:13px;font-weight:700;color:var(--ca,#e6edf3)}
.ccard-meta{font-size:11px;color:#8b949e}
.ccard-body{padding:12px;overflow:hidden}
canvas{display:block;width:100%;border-radius:4px}
footer{text-align:center;padding:20px;color:#8b949e;font-size:11px;border-top:1px solid #21262d;margin-top:8px}
@media(max-width:600px){
  #main.dim-store,#main.dim-prod{grid-template-columns:1fr}
  .summary{gap:8px}
}
</style>
</head>
<body>
<header>
  <h1>店铺·品名 周度数据看板</h1>
  <span>W1(12/29) ~ W9(03/01) · 共9周</span>
</header>
<div class="ctrl-bar">
  <div class="ctrl-group">
    <span class="ctrl-lbl">维度</span>
    <div class="tab-row">
      <button class="tab dtab active" data-d="store">按店铺</button>
      <button class="tab dtab" data-d="prod">按品名</button>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-lbl">店铺</span>
    <select id="sel-store"><option value="ALL">全部</option></select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-lbl">零销量</span>
    <select id="sel-zero">
      <option value="hide">隐藏</option>
      <option value="show">显示</option>
    </select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-lbl">指标</span>
    <div class="tab-row">
      <button class="tab mtab active" data-m="销量" data-t="count">销量</button>
      <button class="tab mtab" data-m="销售额" data-t="money">销售额</button>
      <button class="tab mtab" data-m="结算毛利润" data-t="money">结算毛利润</button>
      <button class="tab mtab" data-m="订单毛利润" data-t="money">订单毛利润</button>
      <button class="tab mtab" data-m="结算毛利率" data-t="rate">结算毛利率%</button>
      <button class="tab mtab" data-m="订单毛利率" data-t="rate">订单毛利率%</button>
      <button class="tab mtab" data-m="广告花费" data-t="money">广告花费</button>
      <button class="tab mtab" data-m="广告销售额" data-t="money">广告销售额</button>
      <button class="tab mtab" data-m="ACOS" data-t="multi-acos">ACOS组合</button>
      <button class="tab mtab" data-m="退货量" data-t="multi-ret">退货组合</button>
      <button class="tab mtab" data-m="FBA可售" data-t="multi-fba">FBA库存</button>
    </div>
  </div>
</div>
<div id="summary" class="summary"></div>
<div id="main" class="dim-store"></div>
<footer>店铺·品名周度数据看板 · 数据区间 W1(12/29) ~ W9(03/01) · 共9周</footer>

// ── Format a value for display ──────────────────────────────────────────────
function fmtV(v, mtype){
  const isPct = mtype==='rate'||mtype==='multi-acos'||mtype==='multi-ret';
  if(isPct) return v.toFixed(1)+'%';
  if(mtype==='money'){
    if(Math.abs(v)>=10000) return (v>=0?'¥':'−¥')+(Math.abs(v)/10000).toFixed(1)+'万';
    return (v>=0?'¥':'−¥')+Math.abs(Math.round(v)).toLocaleString();
  }
  // count / fba integers
  return Math.round(v).toLocaleString();
}

// ── Short label for bar-top annotation ──────────────────────────────────────
function fmtShort(v, mtype){
  const isPct = mtype==='rate'||mtype==='multi-acos'||mtype==='multi-ret';
  if(isPct) return v.toFixed(1)+'%';
  if(mtype==='money'){
    if(Math.abs(v)>=10000) return (v>=0?'':'-')+(Math.abs(v)/10000).toFixed(1)+'万';
    if(Math.abs(v)>=1000) return (v>=0?'':'-')+(Math.abs(v)/1000).toFixed(1)+'k';
    return Math.round(v).toString();
  }
  if(Math.abs(v)>=10000) return (v>=0?'':'-')+(Math.abs(v)/10000).toFixed(1)+'万';
  if(Math.abs(v)>=1000) return (v>=0?'':'-')+(Math.abs(v)/1000).toFixed(1)+'k';
  return Math.round(v).toString();
}

// ── Core canvas bar-chart renderer ──────────────────────────────────────────
// datasets: [{ label, data:[], color:'#hex'|null, perBarColor:bool }]
// opts: { profitColor:bool, showLabels:bool }
function drawBarChart(canvas, labels, datasets, opts){
  const ctx = canvas.getContext('2d');
  const DPR = window.devicePixelRatio||1;
  const W = canvas.offsetWidth||500;
  const H = canvas.offsetHeight||200;
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx.scale(DPR,DPR);

  const showLabels = opts&&opts.showLabels;
  const nSeries = datasets.length;

  // Generous bottom padding when labels shown; also top for multi-series legend
  const legendH = nSeries>1 ? 22 : 0;
  const PAD = {
    top: legendH + (showLabels ? 20 : 12),
    right: 12,
    bottom: 44,
    left: 56
  };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;

  ctx.clearRect(0,0,W,H);
  if(!datasets||datasets.length===0) return;

  // ── value range ────────────────────────────────────────────────────────
  let minV=Infinity, maxV=-Infinity;
  datasets.forEach(ds=>ds.data.forEach(v=>{if(v<minV)minV=v;if(v>maxV)maxV=v;}));
  if(!isFinite(minV)) return;
  if(minV>=0) minV=0;
  if(maxV<=0) maxV=0;

  // Nice step
  const rawRange = maxV-minV||1;
  const mag = Math.pow(10,Math.floor(Math.log10(rawRange)));
  let step = mag;
  const candidates=[1,2,2.5,5,10];
  for(const c of candidates){
    step=mag*c;
    if(rawRange/step<=6) break;
  }
  const yMin = Math.floor(minV/step)*step;
  const yMax = Math.ceil(maxV/step)*step;
  const yRange = yMax-yMin||1;

  const toY = v => PAD.top + cH*(1-(v-yMin)/yRange);

  // ── grid & Y-axis labels ──────────────────────────────────────────────
  ctx.strokeStyle='#21262d'; ctx.lineWidth=1;
  ctx.fillStyle='#8b949e';
  ctx.font=`10px 'DM Mono',monospace`; ctx.textAlign='right';

  const nTicks = Math.round(yRange/step);
  for(let i=0;i<=nTicks;i++){
    const v = yMin + step*i;
    const y = toY(v);
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(PAD.left+cW,y); ctx.stroke();
    ctx.fillText(fmtShort(v, MTYPE), PAD.left-5, y+3.5);
  }

  // Zero line
  if(yMin<0 && yMax>0){
    ctx.strokeStyle='#484f58'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(PAD.left,toY(0)); ctx.lineTo(PAD.left+cW,toY(0));
    ctx.stroke();
  }

  // ── bars ──────────────────────────────────────────────────────────────
  const nGroups = labels.length;
  const groupW = cW/nGroups;
  const outerPad = groupW*0.12;
  const innerGap = nSeries>1 ? 2 : 0;
  const totalBarW = groupW - outerPad*2 - innerGap*(nSeries-1);
  const barW = Math.max(4, totalBarW/nSeries);

  datasets.forEach((ds,si)=>{
    ds.data.forEach((v,gi)=>{
      const x = PAD.left + gi*groupW + outerPad + si*(barW+innerGap);
      const y0 = toY(0);
      const y1 = toY(v);
      const h = Math.max(1, Math.abs(y0-y1));
      const yTop = v>=0 ? y1 : y0;

      // Determine bar color
      let color;
      if(opts&&opts.profitColor){
        color = v>=0 ? COLOR_POS : COLOR_NEG;
      } else if(ds.perBarColor){
        // per-bar coloring (single series profit-like)
        color = v>=0 ? COLOR_POS : COLOR_NEG;
      } else {
        color = ds.color||'#388bfd';
      }

      // Draw rounded-top bar
      const r = Math.min(3, h/2, barW/2);
      ctx.fillStyle = color;
      ctx.beginPath();
      if(v>=0){
        ctx.moveTo(x+r, yTop);
        ctx.lineTo(x+barW-r, yTop);
        ctx.arcTo(x+barW, yTop, x+barW, yTop+r, r);
        ctx.lineTo(x+barW, yTop+h);
        ctx.lineTo(x, yTop+h);
        ctx.lineTo(x, yTop+r);
        ctx.arcTo(x, yTop, x+r, yTop, r);
      } else {
        ctx.moveTo(x, yTop);
        ctx.lineTo(x+barW, yTop);
        ctx.lineTo(x+barW, yTop+h-r);
        ctx.arcTo(x+barW, yTop+h, x+barW-r, yTop+h, r);
        ctx.lineTo(x+r, yTop+h);
        ctx.arcTo(x, yTop+h, x, yTop+h-r, r);
        ctx.lineTo(x, yTop);
      }
      ctx.closePath(); ctx.fill();

      // ── Value label on top of bar ────────────────────────────────────
      if(showLabels && barW>=10){
        const lbl = fmtShort(v, ds.mtype||MTYPE);
        // font size scales with bar width
        const fs = barW>30 ? 9 : barW>18 ? 8 : 7;
        ctx.font = `${fs}px 'DM Mono',monospace`;
        ctx.textAlign = 'center';
        const cx = x + barW/2;

        if(v>=0){
          ctx.fillStyle = color;
          ctx.fillText(lbl, cx, yTop-3);
        } else {
          ctx.fillStyle = color;
          ctx.fillText(lbl, cx, yTop+h+9);
        }
      }
    });
  });

  // ── X-axis labels ──────────────────────────────────────────────────────
  ctx.fillStyle='#8b949e'; ctx.font=`10px 'DM Mono',monospace`; ctx.textAlign='center';
  labels.forEach((lbl,gi)=>{
    const x = PAD.left + gi*groupW + groupW/2;
    ctx.fillText(lbl, x, PAD.top+cH+14);
  });

  // ── Legend (multi-series) ──────────────────────────────────────────────
  if(nSeries>1){
    ctx.font=`10px 'Noto Sans SC',monospace`; ctx.textAlign='left';
    let lx = PAD.left;
    const ly = legendH/2 + 2;
    datasets.forEach((ds)=>{
      ctx.fillStyle = ds.color||'#388bfd';
      ctx.fillRect(lx, ly-7, 10, 8);
      ctx.fillStyle = '#c9d1d9';
      ctx.fillText(ds.label, lx+13, ly+1);
      lx += ctx.measureText(ds.label).width + 28;
    });
  }
}

// ── Build dataset array for a given value getter fn ──────────────────────
function buildDatasets(getter){
  const isProfitLike = PROFIT_METRICS.has(METRIC);

  if(MTYPE.startsWith('multi')){
    const md = MULTI_DEF[METRIC];
    return md.keys.map((k,i)=>{
      return {
        label: md.labels[i],
        color: md.colors[i],
        perBarColor: false,
        mtype: md.mtypes ? md.mtypes[i] : MTYPE,
        data: WEEKS.map(w=>getter(w,k))
      };
    });
  } else {
    return [{
      label: METRIC,
      color: isProfitLike ? null : '#388bfd',
      perBarColor: isProfitLike,
      data: WEEKS.map(w=>getter(w,METRIC))
    }];
  }
}

// ── Chart options: always show labels for multi and profit metrics ────────
function chartOpts(){
  const isMulti = MTYPE.startsWith('multi');
  const isProfitLike = PROFIT_METRICS.has(METRIC);
  return {
    profitColor: isProfitLike,
    showLabels: true
  };
}

// ── Card builders ─────────────────────────────────────────────────────────
function buildStoreCard(store){

  card.className='ccard';
  card.style.setProperty('--ca', SC[store]||'#4fa3e0');

  const prods = allProds([store]);
  const totSales9 = prods.reduce((a,p)=>a+WEEKS.reduce((b,w)=>b+wv(store,p,w,'销量'),0),0);

  card.innerHTML = `<div class="ccard-hdr"><div class="ccard-name">${store}</div><div class="ccard-meta">9周总销量 ${Math.round(totSales9).toLocaleString()}</div></div><div class="ccard-body"><canvas style="height:200px"></canvas></div>`;

  const canvas = card.querySelector('canvas');
  requestAnimationFrame(()=>{
    const ds = buildDatasets((w,k)=>storeWkSum(store,w,k));
    drawBarChart(canvas, WS, ds, chartOpts());
  });

  return card;
}

    const isProfitLike = PROFIT_METRICS.has(METRIC);
    const opts = chartOpts();

    if(ss.length===1){
      const ds = buildDatasets((w,k)=>wv(ss[0],prod,w,k));
      // tint single-store with store color (unless profit/multi)
      if(!isProfitLike && !MTYPE.startsWith('multi')){
        ds.forEach(d=>d.color=SC[ss[0]]||d.color);
      }
      drawBarChart(canvas, WS, ds, opts);
    } else {
      if(MTYPE.startsWith('multi')){
        // sum across stores, keep multi-color by key
        const ds = buildDatasets((w,k)=>prodWkSum(prod,ss,w,k));
        drawBarChart(canvas, WS, ds, opts);
      } else if(isProfitLike){
        // one series, per-bar pos/neg color, summed across stores
        const ds = buildDatasets((w,k)=>prodWkSum(prod,ss,w,k));
        drawBarChart(canvas, WS, ds, opts);
      } else {
        // grouped bars by store
        const ds = ss.map(s=>{
          return {
            label:s,
            color:SC[s]||'#388bfd',
            perBarColor:false,
            data:WEEKS.map(w=>wv(s,prod,w,METRIC))
          };
        });
        drawBarChart(canvas, WS, ds, {profitColor:false, showLabels:true});
      }
    }
  });

  return card;
}

// ── Summary cards ────────────────────────────────────────────────────────
function buildSummary(){
  const all_s = actStores();
  const all_p = allProds(all_s);
  const sum=(k)=>all_s.reduce((a,s)=>a+all_p.reduce((b,p)=>b+WEEKS.reduce((c,w)=>c+wv(s,p,w,k),0),0),0);
  const totQ=sum('销量'), totRev=sum('销售额'), totGP=sum('结算毛利润'),
        totOP=sum('订单毛利润'), totAd=sum('广告花费'), totAdS=sum('广告销售额'),
        totRet=sum('退货量');
  const avgAcos=totAdS>0?totAd/totAdS*100:0;
  const fmt=v=>Math.abs(v)>=10000?(v>=0?'':'−')+'¥'+(Math.abs(v)/10000).toFixed(1)+'万':'¥'+Math.round(v).toLocaleString();

  const cards=[
    {lbl:'总销量',val:Math.round(totQ).toLocaleString(),sub:'9周合计',ca:'#388bfd'},
    {lbl:'总销售额',val:fmt(totRev),sub:'9周合计',ca:'#4fa3e0'},
    {lbl:'结算毛利润',val:fmt(totGP),sub:'9周合计',ca:totGP>=0?'#3fb950':'#f07060'},
    {lbl:'订单毛利润',val:fmt(totOP),sub:'9周合计',ca:totOP>=0?'#3fb950':'#f07060'},
    {lbl:'广告花费',val:fmt(totAd),sub:'9周合计',ca:'#e8943a'},
    {lbl:'综合ACOS',val:avgAcos.toFixed(1)+'%',sub:'广告花费/广告销售额',ca:'#e8943a'},
    {lbl:'总退货量',val:Math.round(totRet).toLocaleString(),sub:'9周合计',ca:'#f07060'},
  ];
  const el=document.getElementById('summary');
  el.innerHTML='';
  cards.forEach(c=>{
    const d=document.createElement('div'); d.className='scard';
    d.style.setProperty('--ca',c.ca);
    d.innerHTML=`<div class="scard-lbl">${c.lbl}</div><div class="scard-val">${c.val}</div><div class="scard-sub">${c.sub}</div>`;
    el.appendChild(d);
  });
}

// ── Main render ──────────────────────────────────────────────────────────
function render(){
  buildSummary();
  const main=document.getElementById('main');
  main.innerHTML='';
  main.className='dim-'+DIM;

  if(DIM==='store'){
    actStores().forEach(s=>{
      if(ZF==='hide'&&!allProds([s]).some(p=>hasData(s,p)))return;
      main.appendChild(buildStoreCard(s));
    });
  } else {
    allProds(actStores()).forEach(p=>{
      const card=buildProdCard(p);
      if(card) main.appendChild(card);
    });
  }
}

let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(render,200);});

document.querySelectorAll('.dtab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.dtab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); DIM=b.dataset.d; render();
  });
});
document.querySelectorAll('.mtab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.mtab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); METRIC=b.dataset.m; MTYPE=b.dataset.t; render();
  });
});
document.getElementById('sel-store').addEventListener('change',e=>{SF=e.target.value;render();});
document.getElementById('sel-zero').addEventListener('change',e=>{ZF=e.target.value;render();});

render();
</script>
